<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bluetreasure HR system</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
<header>
    <div class="logo">
        <img src="../static/gazprom-neft-logo-eng.svg" alt="GazProm Neft Logo">
    </div>
    <div class="title">Bluetreasure HR system</div>
</header>
<main>
<!-- Источник данных -->
  <div class="db_badge">
    <div class="db_dot"></div>
    Данные из OpenSearch: индексы <strong>candidates</strong> и <strong>vacancy</strong>
  </div>

  <!-- Вакансия -->
  <div class="llm_response_card">
    <div class="llm_response_header">

      Текст вакансии
    </div>
    <div class="llm_response_body">{{ vac_text }}</div>
  </div>

  <!-- Кандидаты -->
  <div class="llm_response_card">
    <div class="candidates_header">

      Кандидаты
    </div>
    <div class="candidates_list">
      {{ cand_text | safe }}
    </div>
  </div>

  <!-- Кнопка назад -->
  <div class="back_btn_cont">
    <a href="/" class="back_btn">Вернуться</a>
  </div>
    </main>
</body>
</html>
