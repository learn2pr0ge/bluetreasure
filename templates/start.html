<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Bluetreasure</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; line-height: 1.4; }
        h1 { margin-bottom: 24px; }
        .menu { display: grid; gap: 12px; }
        .card {
            display: block;
            padding: 16px 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-decoration: none;
            color: #111;
            background: #fafafa;
        }
        .card:hover { background: #f0f0f0; }
        .card-title { font-weight: bold; margin-bottom: 6px; }
    </style>
</head>
<body>
    <h1>Bluetreasure</h1>

    <div class="menu">
        <a class="card" href="{{ url_for('webstart.vacancies_page') }}">
            <div class="card-title">База вакансий</div>
            <div>Добавление вакансий из текста или PDF и просмотр уже загруженных.</div>
        </a>

        <a class="card" href="{{ url_for('webstart.candidates_upload_page') }}">
            <div class="card-title">Загрузка резюме</div>
            <div>Пачечная загрузка HH PDF резюме в индекс candidates.</div>
        </a>

        <a class="card" href="{{ url_for('webstart.search_page') }}">
            <div class="card-title">Поиск кандидатов</div>
            <div>Выбор вакансии из базы и поиск top-N кандидатов.</div>
        </a>
    </div>
</body>
</html>
